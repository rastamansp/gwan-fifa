# Gwan FIFA — stack API (Portainer). Slot 15 · api-worldcup.gwan.cloud
# Env vars (secrets) definidas na UI do Portainer — nunca commitar valores reais.
services:
  gwan-fifa-api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: gwan-fifa-api:latest
    container_name: gwan-fifa-api
    restart: unless-stopped
    environment:
      PORT: 3000
      API_PREFIX: api
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-stickers}
      SIGNED_URL_TTL: ${SIGNED_URL_TTL:-3600}
      PUBLIC_URL: ${PUBLIC_URL:-https://worldcup.gwan.cloud}
      GWAN_SITE_URL: ${GWAN_SITE_URL:-https://gwan.cloud}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://worldcup.gwan.cloud}
    networks:
      - gwan-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=gwan-network"
      - "traefik.http.routers.gwan-fifa-api.rule=Host(`api-worldcup.gwan.cloud`)"
      - "traefik.http.routers.gwan-fifa-api.entrypoints=websecure"
      - "traefik.http.routers.gwan-fifa-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.gwan-fifa-api.loadbalancer.server.port=3000"

networks:
  gwan-network:
    external: true
